<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia &&
                window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>

    <!-- Google Consent Mode v2 — se inicializa inline (necesario antes de
         cargar GA). El script de gtag.js se carga diferido tras el LCP para
         no penalizar el First Contentful Paint. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      // Default: storage denegado hasta que el usuario acepte en el banner.
      // wait_for_update da 500ms al banner para resolver antes de disparar pings.
      gtag("consent", "default", {
        ad_storage: "denied",
        ad_user_data: "denied",
        ad_personalization: "denied",
        analytics_storage: "denied",
        wait_for_update: 500,
      });
      // Reaplica el consentimiento previo (si existe) antes de cargar GA, para
      // que el primer page_view ya respete la elección guardada del usuario.
      try {
        var prev = localStorage.getItem("atep_cookie_consent_v1");
        if (prev === "granted") {
          gtag("consent", "update", {
            ad_storage: "granted",
            ad_user_data: "granted",
            ad_personalization: "granted",
            analytics_storage: "granted",
          });
        }
      } catch (e) {
        /* localStorage indisponible: arrancamos en denied */
      }
      gtag("js", new Date());
      gtag("config", "G-GDE5LM5ND1");

      // Carga diferida del script de GA: esperamos al evento load (LCP ya
      // pintado) o a la primera interacción del usuario, lo que ocurra antes.
      // Reduce el coste de JS de tercera parte durante el critical path móvil.
      (function loadGA() {
        var loaded = false;
        function inject() {
          if (loaded) return;
          loaded = true;
          var s = document.createElement("script");
          s.async = true;
          s.src = "https://www.googletagmanager.com/gtag/js?id=G-GDE5LM5ND1";
          document.head.appendChild(s);
        }
        if (document.readyState === "complete") {
          setTimeout(inject, 1500);
        } else {
          window.addEventListener("load", function () {
            setTimeout(inject, 1500);
          });
        }
        ["pointerdown", "keydown", "touchstart", "scroll"].forEach(function (
          ev,
        ) {
          window.addEventListener(ev, inject, { once: true, passive: true });
        });
      })();
    </script>
