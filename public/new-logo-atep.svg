<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente principal -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
  </defs>
  
  <!-- Líneas de conexión -->
  <line x1="60" y1="20" x2="20" y2="100" stroke="url(#primaryGradient)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="60" y1="20" x2="100" y2="100" stroke="url(#primaryGradient)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="35" y1="70" x2="85" y2="70" stroke="url(#primaryGradient)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Nodos principales -->
  <circle cx="60" cy="20" r="10" fill="url(#primaryGradient)"/>
  <circle cx="20" cy="100" r="10" fill="url(#primaryGradient)"/>
  <circle cx="100" cy="100" r="10" fill="url(#primaryGradient)"/>
  <circle cx="60" cy="70" r="8" fill="url(#primaryGradient)"/>
  
  <!-- Puntos de datos flotantes (animados) -->
  <circle cx="40" cy="45" r="3" fill="#e11d48" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="45" r="3" fill="#e11d48" opacity="0.6">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="90" r="3" fill="#e11d48" opacity="0.6">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>